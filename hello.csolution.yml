# A solution is a collection of related projects that share same base configuration.
solution:
  description: Simple Hello World example for B-U585I-IOT02A
  created-for: CMSIS-Toolbox@2.9.0
  cdefault:

  # List of tested compilers that can be selected
  select-compiler:
    - compiler: AC6
  compiler: AC6

  # Project define
  define:
    - OS_IDLE_THREAD_NAME: \"Idle\"
    - OS_TIMER_THREAD_NAME: \"Timer\"

  # List the packs that define the device and/or board.
  packs:
    - pack: Keil::STM32U5xx_DFP
    - pack: Keil::B-U585I-IOT02A_BSP
    - pack: ARM::CMSIS-Driver_STM32
    - pack: ARM::CMSIS
    - pack: ARM::CMSIS-Compiler
    - pack: ARM::CMSIS-RTX

  # List different hardware targets that are used to deploy the solution.
  target-types:
    - type: B-U585I-IOT02A
      board: STMicroelectronics::B-U585I-IOT02A
      processor:
        trustzone: off
      target-set:
        - set:
          debugger:
            name: ST-LINK
          images:
            - project-context: hello.Debug

  # List of different build configurations.
  build-types:
    - type: Debug
      debug: on
      optimize: debug

    - type: Release
      debug: off
      optimize: balanced

  misc:
    - for-compiler: AC6
      C-CPP:
        - -gdwarf-5
      ASM:
        - -gdwarf-5

  # List related projects.
  projects:
    - project: ./hello.cproject.yml
